name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Playwright tests with pytest and generate Allure results
        run: |
          pytest -m regression --alluredir=allure-results --numprocesses 2

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.14
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      # ⭐ КЛЮЧЕВОЙ ШАГ: Копируем отчет в корень
      - name: Move report to root
        if: always()
        run: |
          echo "=== Checking allure-history structure ==="
          ls -la allure-history/
          
          # Находим папку с отчетом
          REPORT_DIR=$(find allure-history -maxdepth 1 -type d -name "[0-9]*" | sort -n | tail -1)
          
          if [ -n "$REPORT_DIR" ] && [ -d "$REPORT_DIR" ]; then
            echo "✅ Found report in: $REPORT_DIR"
            
            # Копируем содержимое отчета в корень allure-history
            cp -r $REPORT_DIR/* allure-history/
            
            # Проверяем результат
            if [ -f "allure-history/index.html" ]; then
              echo "✅ index.html successfully moved to root!"
              echo "First 5 lines of index.html:"
              head -5 allure-history/index.html
            else
              echo "⚠️ index.html still not in root, creating redirect..."
              REPORT_NAME=$(basename $REPORT_DIR)
              cat > allure-history/index.html << EOF
              <!DOCTYPE html>
              <html>
                <head>
                  <meta charset="UTF-8">
                  <meta http-equiv="refresh" content="0; url=./$REPORT_NAME/">
                  <title>Allure Report</title>
                </head>
                <body>
                  <p>Redirecting to <a href="./$REPORT_NAME/">Allure Report</a>...</p>
                </body>
              </html>
              EOF
              echo "✅ Redirect created"
            fi
          else
            echo "❌ No report directory found!"
            mkdir -p allure-history
            cat > allure-history/index.html << 'EOF'
            <!DOCTYPE html>
            <html>
              <head><meta charset="UTF-8"><title>Test Results</title></head>
              <body>
                <h1>Test Results</h1>
                <p>No report generated. Please check the logs.</p>
              </body>
            </html>
            EOF
          fi
          
          echo "=== Final allure-history structure ==="
          ls -la allure-history/
          echo -e "\n=== Checking if index.html is in root ==="
          if [ -f "allure-history/index.html" ]; then
            echo "✅ SUCCESS: index.html exists in root!"
          else
            echo "❌ FAILED: index.html not found in root!"
            exit 1
          fi

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Allure report ${{ github.sha }}'